<!DOCTYPE html>
<html>

<head>
    <title>Work Formatter</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
    
        * {
            box-sizing: border-box;
        }
    
        html {
            scroll-behavior: smooth;
        }
    
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f10;
            color: #f2f2f2;
            padding: 22px;
            margin: 0;
            line-height: 1.5;
        }
    
        /* TOP */
    
        .topSection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            text-align: center;
        }
    
        #lastUpdated {
            color: #7d7d7d;
            font-size: 12px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
        }
    
        h1 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
        }
    
        /* INPUT */
    
        textarea {
            width: 100%;
            min-height: 260px;
            background: #171717;
            color: #f5f5f5;
            border: 1px solid #2b2b2b;
            border-radius: 16px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
            transition: 0.2s ease;
            outline: none;
        }
    
        textarea:focus {
            border-color: #4a4a4a;
            background: #1b1b1b;
        }
    
        textarea::placeholder {
            color: #777;
        }
    
        /* BUTTONS */
    
        .buttonRow {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-top: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
    
        .mainButton {
            background: #ffffff;
            color: #111;
            border: none;
            border-radius: 12px;
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
            font-family: 'Inter', sans-serif;
        }
    
        .mainButton:hover {
            transform: translateY(-1px);
            opacity: 0.93;
        }
    
        .mainButton:active {
            transform: scale(0.98);
        }
    
        .changelogBtn {
            background: none;
            border: none;
            color: #9c9c9c;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: 0.15s ease;
        }
    
        .changelogBtn:hover {
            color: white;
        }
    
        /* OUTPUT */
    
        #output {
            margin-top: 24px;
            overflow-x: auto;
            border-radius: 16px;
        }
    
        /* TABLE */
    
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 950px;
            overflow: hidden;
            border: 1px solid #252525;
            border-radius: 16px;
        }
    
        thead {
            position: sticky;
            top: 0;
        }
    
        th {
            background: #181818;
            color: #dcdcdc;
            padding: 14px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            font-family: 'Space Grotesk', sans-serif;
            border-bottom: 1px solid #2b2b2b;
        }
    
        td {
            background: #131313;
            border-bottom: 1px solid #232323;
            padding: 10px;
            vertical-align: top;
            font-size: 13px;
        }
    
        tr:hover td {
            background: #171717;
        }
    
        /* TIME COLUMN */
    
        td:first-child {
            color: #8e8e8e;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            width: 90px;
        }
    
        /* COPY BOX */
    
        .copybox {
            background: #1f1f1f;
            border: 1px solid #2a2a2a;
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s ease;
            word-break: break-word;
        }
    
        .copybox:hover {
            background: #272727;
            border-color: #3a3a3a;
        }
    
        .copybox:active {
            transform: scale(0.99);
        }
    
        .copied {
            outline: 2px solid #00cc66;
        }
        .copybox.copyperm  {
            background: #404040 !important;
            border: 1px solid #575757 !important;
        }

        .copybox.med-special {
            background: #3a2a1a; 
            outline: 1px solid #ffb347;
        }
    
        /* MODAL */
    
        #changelogModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
            z-index: 999;
        
            /* animation */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        #changelogModal.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
    
        .modalBox {
            background: #161616;
            width: 430px;
            max-width: 92%;
            height: 340px;
            border-radius: 20px;
            padding: 18px;
            position: relative;
            border: 1px solid #2b2b2b;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);
        }
    
        .closeBtn {
            position: absolute;
            top: 12px;
            right: 15px;
            cursor: pointer;
            font-size: 17px;
            color: #8d8d8d;
            transition: 0.15s ease;
        }
    
        .closeBtn:hover {
            color: white;
        }
    
        #changelogContent {
            white-space: pre-wrap;
            overflow-y: auto;
            height: 255px;
            background: #101010;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px;
            margin-top: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d8d8d8;
        }
    
        /* SCROLLBAR */
    
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
    
        ::-webkit-scrollbar-track {
            background: #111;
        }
    
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 20px;
        }
    
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    
        /* MOBILE */
    
        @media (max-width: 768px) {
    
            body {
                padding: 12px;
            }
    
            h1 {
                font-size: 28px;
            }
    
            #lastUpdated {
                font-size: 11px;
            }
    
            textarea {
                min-height: 180px;
                padding: 13px;
                font-size: 12px;
                border-radius: 14px;
            }
    
            .buttonRow {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
    
            .mainButton {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }
    
            .changelogBtn {
                font-size: 12px;
            }
    
            table {
                min-width: 850px;
            }
    
            th {
                font-size: 11px;
                padding: 10px;
            }
    
            td {
                font-size: 11px;
                padding: 8px;
            }
    
            .copybox {
                padding: 8px;
                font-size: 11px;
            }
    
            .modalBox {
                width: 95%;
                height: 78%;
                border-radius: 18px;
            }
    
            #changelogContent {
                height: calc(100% - 70px);
            }
        }
    
    </style>
</head>

<body>

    <!-- CHANGELOG MODAL -->

    <div id="changelogModal">

        <div class="modalBox">

            <div class="closeBtn" onclick="closeChangelog()">
                ✕
            </div>

            <h3 style="margin-top:0; font-family:'Space Grotesk', sans-serif;">
                Changelogs
            </h3>

            <div id="changelogContent">
                Loading changelogs...
            </div>

        </div>

    </div>

    <!-- TOP SECTION -->

    <div class="topSection">

        <div id="lastUpdated"></div>

        <h1>Work Formatter</h1>

    </div>

    <!-- INPUT -->

    <textarea id="input" placeholder="Paste entries here..."></textarea>

    <!-- BUTTONS -->

    <div class="buttonRow">

        <button class="mainButton" onclick="formatEntries()">
            Format Entries
        </button>

        <button class="changelogBtn" onclick="openChangelog()">
            Changelogs
        </button>

    </div>

    <!-- OUTPUT -->

    <div id="output"></div>

    <script>

        function showLastUpdated() {

            const lastUpdated = new Date(document.lastModified);

            document.getElementById("lastUpdated").innerText =
                "Last updated: " + lastUpdated.toLocaleString();
        }

        showLastUpdated();

        async function loadChangelog() {

            try {
        
                const response = await fetch('changelogs.md');
                const text = await response.text();
        
                const box = document.getElementById('changelogContent');
        
                box.innerText = text;
                requestAnimationFrame(() => {
                    box.scrollTo({
                        top: box.scrollHeight,
                        behavior: "smooth"
                    });
                });
        
            } catch (err) {
        
                document.getElementById('changelogContent').innerText =
                    'Failed to load changelogs.';
            }
        }

        function openChangelog() {

            const modal = document.getElementById("changelogModal");
    
            modal.classList.add("show");
        
            loadChangelog();
        }
    
        function closeChangelog() {
    
            const modal = document.getElementById("changelogModal");
    
            modal.classList.remove("show");
        }

        function cleanLine(line) {

            return line
                .replace(/‎/g, '')
                .trim();
        }

        function copyText(element) {

            const text = decodeURIComponent(element.dataset.copy || '');
        
            navigator.clipboard.writeText(text);
        
            element.classList.add('copied');
            element.classList.add('copyperm');
        
            setTimeout(() => {
                element.classList.remove('copied');
            }, 500);
        }

        const specialMeds = [
            "alprazolam",
            "apo-alpraz",
            "apo-lorazepam",
            "asolan",
            "concerta",
            "diazepam",
            "insopin",
            "medikinet",
            "nasal spray (esketamine)",
            "ritalin",
            "rivopam",
            "rivotril",
            "somidem",
            "stillnox"
        ];

        function formatEntries() {

            const raw = document.getElementById('input').value;

            const lines = raw
                .split('\n')
                .map(cleanLine);

            const entries = [];

            let currentEntry = [];

            for (const line of lines) {

                currentEntry.push(line);

                if (line.includes('PR/')) {

                    entries.push(currentEntry);

                    currentEntry = [];
                }
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>TIME</th>
                            <th>NAME</th>
                            <th>ADDRESS</th>
                            <th>IDENTIFICATION</th>
                            <th>MED</th>
                            <th>AMOUNT</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            entries.forEach(entryLines => {

                // TIME

                let time = '';

                const firstLine = entryLines[0] || '';

                const timeMatch =
                    firstLine.match(/\b(\d{2}:\d{2}:\d{2})\b/);

                if (timeMatch) {
                    time = timeMatch[1];
                }

                // NAME

                let name = '';

                const nameMatch =
                    firstLine.match(/\d{2}:\d{2}:\d{2}\s+(.*?)\s+TMF/i);

                if (nameMatch) {

                    name = nameMatch[1]
                        .replace(/\s+\.\s*$/, '')
                        .trim();
                }

                // IDENTIFICATION

                let identification = '';

                if (entryLines[3]) {

                    identification =
                        entryLines[3].replace(/[^a-zA-Z0-9-]/g, '');
                }

                // ADDRESS

                let addressLines =
                    entryLines.slice(6, 19);

                addressLines = addressLines
                    .map(x => x.trim())
                    .filter(x => x !== '-')
                    .filter(x => x !== '');

                let address = addressLines.join(', ');

                address = address
                    .replace(/,\s*,+/g, ',')
                    .replace(/\s+/g, ' ')
                    .trim();

                // MED

                let med = '';

                for (const line of entryLines) {

                    if (
                        line.includes('ORIGINAL MED') ||
                        line.includes('GENERIC MED')
                    ) {

                        const afterMed =
                            line.split(/ORIGINAL MED|GENERIC MED/)[1] || '';

                        const beforeType =
                            afterMed.split(/CAPSULE|TABLET/i)[0] || '';

                        const medMatch =
                            beforeType.match(/\(([^)]+)\)/);

                        if (medMatch) {

                            med = medMatch[1].trim();

                        } else {

                            const fallback =
                                beforeType
                                    .split(/\s{2,}|\t+/)
                                    .map(x => x.trim())
                                    .filter(x => x);

                            med = fallback[fallback.length - 1] || '';
                        }
                    }
                }

                // AMOUNT

                let amount = '';

                for (let i = 0; i < entryLines.length; i++) {

                    const line = entryLines[i];

                    if (
                        line.includes('CAPSULE') ||
                        line.includes('TABLET')
                    ) {

                        for (let j = i; j < entryLines.length; j++) {

                            const numMatch =
                                entryLines[j].match(/(\d+)\.0/);

                            if (numMatch) {

                                amount = numMatch[1];

                                break;
                            }
                        }
                    }
                }
                
                const normalize = (str) =>
                    (str || '')
                        .toLowerCase()
                        .replace(/\s+/g, ' ')
                        .trim();
                
                const medClean = normalize(med);
                
                const isSpecialMed = specialMeds.some(m =>
                    medClean.includes(normalize(m))
                );
                
                html += `
                    <tr>

                        <td style="color:#888; font-family:'JetBrains Mono', monospace;">
                            ${time || '-'}
                        </td>

                        <td>
                            <div class="copybox"
                                data-copy="${encodeURIComponent(name)}"
                                 onclick="copyText(this)">
                                ${name || '-'}
                            </div>
                        </td>

                        <td>
                            <div class="copybox"
                                data-copy="${encodeURIComponent(address)}"
                                 onclick="copyText(this)">
                                ${address || '-'}
                            </div>
                        </td>

                        <td>
                            <div class="copybox"
                                data-copy="${encodeURIComponent(identification)}"
                                 onclick="copyText(this)">
                                ${identification || '-'}
                            </div>
                        </td>

                        <td>
                            <div class="copybox med-box ${isSpecialMed ? 'med-special' : ''}"
                                data-copy="${encodeURIComponent(med)}"
                                onclick="copyText(this)">
                                ${med || '-'}
                            </div>
                        </td>

                        <td>
                            <div class="copybox"
                                data-copy="${encodeURIComponent(amount)}"
                                 onclick="copyText(this)">
                                ${amount || '-'}
                            </div>
                        </td>

                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById('output').innerHTML = html;
        }
    </script>

</body>
</html>
