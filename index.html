<!DOCTYPE html>
<html>
<head>
    <title>Medical Formatter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .entry {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .field {
            margin-bottom: 12px;
        }

        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .copybox {
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
            word-break: break-word;
        }

        .copybox:hover {
            background: #383838;
        }

        .copied {
            border-color: #00cc66;
        }
    </style>
</head>
<body>

<h1>Medical Entry Formatter</h1>

<textarea id="input" placeholder="Paste entries here..."></textarea>

<br>
<button onclick="formatEntries()">Format Entries</button>

<div id="output"></div>

<script>

function cleanLine(line) {
    return line
        .replace(/‎/g, '')
        .trim();
}

function copyText(element, text) {
    navigator.clipboard.writeText(text);

    element.classList.add('copied');

    setTimeout(() => {
        element.classList.remove('copied');
    }, 600);
}

function makeCopyBox(label, value) {
    return `
        <div class="field">
            <div class="label">${label}</div>
            <div class="copybox" onclick="copyText(this, ${JSON.stringify(value)})">
                ${value || '-'}
            </div>
        </div>
    `;
}

function formatEntries() {

    const raw = document.getElementById('input').value;

    const lines = raw
        .split('\n')
        .map(cleanLine)
        .filter(x => x !== '');

    const entries = [];
    let currentEntry = [];

    for (const line of lines) {

        currentEntry.push(line);

        if (line.includes('PR/')) {
            entries.push(currentEntry);
            currentEntry = [];
        }
    }

    let html = '';

    entries.forEach((entryLines, index) => {

        // NAME
        let name = '';

        const firstLine = entryLines[0] || '';

        const nameMatch = firstLine.match(/\d{2}:\d{2}:\d{2}\s+(.*?)\s+TMF/i);

        if (nameMatch) {
            name = nameMatch[1].trim();
        }

        // IDENTIFICATION
        let identification = '';

        if (entryLines[3]) {
            identification = entryLines[3]
                .replace(/[^\d]/g, '');
        }

        // ADDRESS
        let addressLines = entryLines.slice(6, 19);

        addressLines = addressLines
            .map(x => x.trim())
            .filter(x => x !== '-')
            .filter(x => x !== '');

        let address = addressLines.join(', ');

        address = address
            .replace(/,\s*,+/g, ',')
            .replace(/\s+/g, ' ')
            .trim();

        // MED
        let med = '';

        for (const line of entryLines) {

            if (
                line.includes('ORIGINAL MED') ||
                line.includes('GENERIC MED')
            ) {

                const medMatch = line.match(/\((.*?)\)/);

                if (medMatch) {
                    med = medMatch[1].trim();
                }
            }
        }

        // AMOUNT
        let amount = '';

        for (let i = 0; i < entryLines.length; i++) {

            const line = entryLines[i];

            if (
                line.includes('CAPSULE') ||
                line.includes('TABLET')
            ) {

                for (let j = i; j < entryLines.length; j++) {

                    const numMatch = entryLines[j].match(/(\d+)\./);

                    if (numMatch) {
                        amount = numMatch[1];
                        break;
                    }
                }
            }
        }

        html += `
            <div class="entry">
                <h2>Entry ${index + 1}</h2>

                ${makeCopyBox('NAME', name)}
                ${makeCopyBox('ADDRESS', address)}
                ${makeCopyBox('IDENTIFICATION', identification)}
                ${makeCopyBox('MED', med)}
                ${makeCopyBox('AMOUNT', amount)}
            </div>
        `;
    });

    document.getElementById('output').innerHTML = html;
}

</script>

</body>
</html>
