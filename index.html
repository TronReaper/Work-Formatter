<!DOCTYPE html>
<html>
<head>
    <title>Work Formatter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background: #222;
            border: 1px solid #555;
            padding: 12px;
        }

        td {
            border: 1px solid #555;
            padding: 10px;
            vertical-align: top;
        }

        .copybox {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            word-break: break-word;
        }

        .copybox:hover {
            background: #3a3a3a;
        }

        .copied {
            outline: 2px solid #00cc66;
        }
    </style>
</head>

    <div id="changelogModal"
     style="display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
            justify-content:center;
            align-items:center;">

    <div style="background:#1e1e1e;
                width:400px;
                height:300px;
                border-radius:16px;
                padding:15px;
                position:relative;
                box-shadow:0 0 10px rgba(0,0,0,0.5);">

        <!-- CLOSE BUTTON -->
        <div onclick="closeChangelog()"
             style="position:absolute;
                    top:10px;
                    right:12px;
                    cursor:pointer;
                    font-size:18px;
                    color:white;">
            ✕
        </div>

        <h3 style="margin-top:0;">Changelogs</h3>

        <!-- EDITABLE TEXT AREA -->
        <div id="changelogContent"
             style="white-space:pre-wrap;
                    overflow-y:auto;
                    height:220px;
                    background:#111;
                    border:1px solid #444;
                    border-radius:10px;
                    padding:10px;">
            Loading changelogs...
        </div>

    </div>
</div>
    
<body>

<div id="lastUpdated" style="margin: 10px 0; color: #aaa; font-size: 14px;"></div>

<h1>Work Formatter</h1>

<textarea id="input" placeholder="Paste entries here..."></textarea>

<br>

<div style="display:flex; gap:10px; margin-top:15px;">
    
    <button onclick="formatEntries()">
        Format Entries
    </button>

    <button onclick="openChangelog()">
        Changelogs
    </button>

</div>

<div id="output"></div>

<script>
function showLastUpdated() {

    const lastUpdated = new Date(document.lastModified);

    document.getElementById("lastUpdated").innerText =
        "Last updated: " + lastUpdated.toLocaleString();
}

showLastUpdated();


async function loadChangelog() {

    try {

        const response = await fetch('changelogs.md');

        const text = await response.text();

        document.getElementById('changelogContent').innerText = text;

    } catch (err) {

        document.getElementById('changelogContent').innerText =
            'Failed to load changelogs.';
    }
}
    
function openChangelog() {

    document.getElementById("changelogModal").style.display = "flex";

    loadChangelog();
}

function closeChangelog() {

    document.getElementById("changelogModal").style.display = "none";
}
    
function cleanLine(line) {
    return line
        .replace(/‎/g, '')
        .trim();
}

function copyText(element, text) {

    navigator.clipboard.writeText(text);

    element.classList.add('copied');

    setTimeout(() => {
        element.classList.remove('copied');
    }, 500);
}

function formatEntries() {

    const raw = document.getElementById('input').value;

    const lines = raw
        .split('\n')
        .map(cleanLine)

    const entries = [];

    let currentEntry = [];

    for (const line of lines) {

        currentEntry.push(line);

        if (line.includes('PR/')) {

            entries.push(currentEntry);

            currentEntry = [];
        }
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>TIME</th>
                    <th>NAME</th>
                    <th>ADDRESS</th>
                    <th>IDENTIFICATION</th>
                    <th>MED</th>
                    <th>AMOUNT</th>
                </tr>
            </thead>
            <tbody>
    `;

    entries.forEach(entryLines => {

        // TIME
        let time = '';
        
        const firstLine = entryLines[0] || '';
        
        const timeMatch = firstLine.match(/\b(\d{2}:\d{2}:\d{2})\b/);
        
        if (timeMatch) {
            time = timeMatch[1];
        }
        
        // NAME
        let name = '';

        const nameMatch =
            firstLine.match(/\d{2}:\d{2}:\d{2}\s+(.*?)\s+TMF/i);

        if (nameMatch) {
            name = nameMatch[1]
                .replace(/\s+\.\s*$/, '')
                .trim();
        }

        // IDENTIFICATION
        let identification = '';

        if (entryLines[3]) {

            identification =
                entryLines[3].replace(/[^a-zA-Z0-9-]/g, '');
        }

        // ADDRESS
        let addressLines =
            entryLines.slice(6, 19);

        addressLines = addressLines
            .map(x => x.trim())
            .filter(x => x !== '-')
            .filter(x => x !== '');

        let address = addressLines.join(', ');

        address = address
            .replace(/,\s*,+/g, ',')
            .replace(/\s+/g, ' ')
            .trim();

        // MED
        let med = '';

        for (const line of entryLines) {
        
            if (
                line.includes('ORIGINAL MED') ||
                line.includes('GENERIC MED')
            ) {
        
                const afterMed =
                    line.split(/ORIGINAL MED|GENERIC MED/)[1] || '';
        
                // STEP 1: cut everything AFTER CAPSULE/TABLET
                const beforeType =
                    afterMed.split(/CAPSULE|TABLET/i)[0] || '';
        
                // STEP 2: try brackets ONLY in that safe zone
                const medMatch =
                    beforeType.match(/\(([^)]+)\)/);
        
                if (medMatch) {
        
                    med = medMatch[1].trim();
        
                } else {
        
                    // STEP 3: fallback (no brackets)
                    // take last meaningful text chunk before CAPSULE/TABLET
        
                    const fallback =
                        beforeType
                            .split(/\s{2,}|\t+/)   // split by big spacing
                            .map(x => x.trim())
                            .filter(x => x);
        
                    med = fallback[fallback.length - 1] || '';
                }
            }
        }

        // AMOUNT
        let amount = '';

        for (let i = 0; i < entryLines.length; i++) {

            const line = entryLines[i];

            if (
                line.includes('CAPSULE') ||
                line.includes('TABLET')
            ) {

                for (let j = i; j < entryLines.length; j++) {

                    const numMatch =
                        entryLines[j].match(/(\d+)\.0/);

                    if (numMatch) {

                        amount = numMatch[1];

                        break;
                    }
                }
            }
        }

        html += `
            <tr>
                <td style="color:#aaa;">
                    ${time || '-'}
                </td>
                
                <td>
                    <div class="copybox"
                        onclick="copyText(this, '${name}')">
                        ${name || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox"
                        onclick="copyText(this, '${address}')">
                        ${address || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox"
                        onclick="copyText(this, '${identification}')">
                        ${identification || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox"
                        onclick="copyText(this, '${med}')">
                        ${med || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox"
                        onclick="copyText(this, '${amount}')">
                        ${amount || '-'}
                    </div>
                </td>

            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    document.getElementById('output').innerHTML = html;
}

</script>

</body>
</html>
