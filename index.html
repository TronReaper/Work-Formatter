<!DOCTYPE html>
<html>

<head>
    <title>Work Formatter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
    
        * {
            box-sizing: border-box;
        }
    
        html {
            scroll-behavior: smooth;
        }
    
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f10;
            color: #f2f2f2;
            padding: 22px;
            margin: 0;
            line-height: 1.5;
        }
    
        /* TOP */
    
        .topSection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            text-align: center;
        }
    
        #lastUpdated {
            color: #7d7d7d;
            font-size: 12px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
        }
    
        h1 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
        }
    
        /* INPUT */
    
        textarea {
            width: 100%;
            min-height: 260px;
            background: #171717;
            color: #f5f5f5;
            border: 1px solid #2b2b2b;
            border-radius: 16px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
            transition: 0.2s ease;
            outline: none;
        }
    
        textarea:focus {
            border-color: #4a4a4a;
            background: #1b1b1b;
        }
    
        textarea::placeholder {
            color: #777;
        }
    
        /* BUTTONS */
    
        .buttonRow {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-top: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
    
        .mainButton {
            background: #ffffff;
            color: #111;
            border: none;
            border-radius: 12px;
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
            font-family: 'Inter', sans-serif;
        }
    
        .mainButton:hover {
            transform: translateY(-1px);
            opacity: 0.93;
        }
    
        .mainButton:active {
            transform: scale(0.98);
        }
    
        .changelogBtn {
            background: none;
            border: none;
            color: #9c9c9c;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: 0.15s ease;
        }
    
        .changelogBtn:hover {
            color: white;
        }
    
        /* OUTPUT */
    
        #output {
            margin-top: 24px;
            overflow-x: auto;
            border-radius: 16px;
        }
    
        /* TABLE */
    
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 950px;
            overflow: hidden;
            border: 1px solid #252525;
            border-radius: 16px;
        }
    
        thead {
            position: sticky;
            top: 0;
        }
    
        th {
            background: #181818;
            color: #dcdcdc;
            padding: 14px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            font-family: 'Space Grotesk', sans-serif;
            border-bottom: 1px solid #2b2b2b;
        }
    
        td {
            background: #131313;
            border-bottom: 1px solid #232323;
            padding: 10px;
            vertical-align: top;
            font-size: 13px;
        }
    
        tr:hover td {
            background: #171717;
        }
    
        /* TIME COLUMN */
    
        td:first-child {
            color: #8e8e8e;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            width: 90px;
        }
    
        /* COPY BOX */
    
        .copybox {
            background: #1f1f1f;
            border: 1px solid #2a2a2a;
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s ease;
            word-break: break-word;
        }
    
        .copybox:hover {
            background: #272727;
            border-color: #3a3a3a;
        }
    
        .copybox:active {
            transform: scale(0.99);
        }
    
        .copied {
            outline: 2px solid #00cc66 !important;
        }
        .copybox.copyperm  {
            background: #404040 !important;
            border: 1px solid #575757 !important;
        }

        .copybox.med-special {
            background: #3a2a1a; 
            outline: 1px solid #ffb347;
        }
    
        /* MODAL */
    
        #changelogModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
            z-index: 999;
        
            /* animation */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        #changelogModal.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
    
        .modalBox {
            background: #161616;
            width: 430px;
            max-width: 92%;
            height: 340px;
            border-radius: 20px;
            padding: 18px;
            position: relative;
            border: 1px solid #2b2b2b;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);
        }
    
        .closeBtn {
            position: absolute;
            top: 12px;
            right: 15px;
            cursor: pointer;
            font-size: 17px;
            color: #8d8d8d;
            transition: 0.15s ease;
        }
    
        .closeBtn:hover {
            color: white;
        }
    
        #changelogContent {
            white-space: pre-wrap;
            overflow-y: auto;
            height: 255px;
            background: #101010;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px;
            margin-top: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d8d8d8;
        }
        /*second button*/
        .hiddenBox {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-8px);
            transition:
                max-height 0.25s ease,
                opacity 0.2s ease,
                transform 0.2s ease,
                margin-top 0.25s ease;
        }
        
        .hiddenBox.show {
            max-height: 400px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 14px;
        }
        
        .secondaryButton {
            background: #1d1d1d;
            color: #f2f2f2;
            border: 1px solid #303030;
        }
        
        .secondaryButton:hover {
            background: #252525;
        }
        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
    
        ::-webkit-scrollbar-track {
            background: #111;
        }
    
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 20px;
        }
    
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    
        /* MOBILE */
    
        @media (max-width: 768px) {
    
            body {
                padding: 12px;
            }
    
            h1 {
                font-size: 28px;
            }
    
            #lastUpdated {
                font-size: 11px;
            }
    
            textarea {
                min-height: 180px;
                padding: 13px;
                font-size: 12px;
                border-radius: 14px;
            }
    
            .buttonRow {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
    
            .mainButton {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }
    
            .changelogBtn {
                font-size: 12px;
            }
    
            table {
                min-width: 850px;
            }
    
            th {
                font-size: 11px;
                padding: 10px;
            }
    
            td {
                font-size: 11px;
                padding: 8px;
            }
    
            .copybox {
                padding: 8px;
                font-size: 11px;
            }
    
            .modalBox {
                width: 95%;
                height: 78%;
                border-radius: 18px;
            }
    
            #changelogContent {
                height: calc(100% - 70px);
            }
        }
    
    </style>
</head>

<body>

<div id="changelogModal">
    <div class="modalBox">
        <div class="closeBtn" onclick="closeChangelog()">✕</div>
        <h3>Changelogs</h3>
        <div id="changelogContent">Loading changelogs...</div>
    </div>
</div>

<div class="topSection">
    <div id="lastUpdated"></div>
    <h1>Work Formatter</h1>
</div>

<textarea id="input" placeholder="Paste entries here..."></textarea>

<div id="secondBoxWrapper" class="hiddenBox">
    <textarea id="input2" placeholder="Paste extra entries here..."></textarea>
</div>

<div class="buttonRow">
    <button class="mainButton secondaryButton" onclick="toggleSecondBox()">Extra Box</button>
    <button class="mainButton" onclick="formatEntries()">Format Entries</button>
    <button class="changelogBtn" onclick="openChangelog()">Changelogs</button>
</div>

<div id="output"></div>

<script>

function showLastUpdated() {
    document.getElementById("lastUpdated").innerText =
        "Last updated: " + new Date(document.lastModified).toLocaleString();
}
showLastUpdated();

function clean(t) {
    return (t || '').replace(/‎/g, '').trim();
}

function escapeHTML(str) {
    return (str || '')
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function copyText(el) {
    const text = decodeURIComponent(el.dataset.copy || '');
    navigator.clipboard.writeText(text);

    el.classList.add('copied', 'copyperm');
    setTimeout(() => el.classList.remove('copied'), 500);
}

function toggleSecondBox() {
    document.getElementById('secondBoxWrapper').classList.toggle('show');
}

const specialMeds = [
    "xanax","apo-alpraz","apo-lorazepam","asolan","concerta",
    "diazepam","insopin","medikinet","nasal spray (esketamine)",
    "ritalin","rivopam","rivotril","somidem","stillnox"
];

function extractMed(lines) {
    for (const line of lines) {
        const match = line.match(/(ORIGINAL MED|GENERIC MED)\s+(.*)/i);
        if (!match) continue;

        const after = match[2] || '';
        const lower = after.toLowerCase();

        if (lower.includes('esketamine')) {
            return after.split(/BOX/i)[0].trim();
        }

        if (lower.includes('alprazolam') || lower.includes('apo-alpraz')) {
            return after.split(/\t|CAPSULE|TABLET|BOX/i)[0].trim();
        }

        const before = after.split(/CAPSULE|TABLET|BOX/i)[0] || '';
        const mm = before.match(/\(([^)]+)\)/);
        return mm ? mm[1].trim() : before.trim();
    }
    return '';
}

function formatEntries() {

    const raw = document.getElementById('input').value;
    const raw2 = document.getElementById('input2').value;

    const entries = [];
    let current = [];

    raw.split('\n').map(clean).forEach(line => {
        current.push(line);
        if (line.includes('PR/')) {
            entries.push(current);
            current = [];
        }
    });

    const secondEntries = [];
    let current2 = [];

    raw2.split('\n').map(clean).forEach(line => {
        const isNew =
            line.includes('M (R)') &&
            line.includes('THE MIND FACULTY SDN BHD');

        if (isNew && current2.length) {
            secondEntries.push(current2);
            current2 = [];
        }
        current2.push(line);
    });

    if (current2.length) secondEntries.push(current2);

    // check invoice existence
    let hasAnyInvoice = false;

    outer:
    for (const e of entries) {
        const name = (e[0] || '').match(/\d{2}:\d{2}:\d{2}\s+(.*?)\s+TMF/i)?.[1] || '';
        const med = extractMed(e);

        for (const s of secondEntries) {
            const text = s.join(' ').toLowerCase();
            if (!text.includes(name.toLowerCase()) || !text.includes(med.toLowerCase())) continue;

            if (s.some(l => /SO\/[\w/]+/.test(l))) {
                hasAnyInvoice = true;
                break outer;
            }
        }
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>TIME</th>
                    <th>NAME</th>
                    ${hasAnyInvoice ? `<th>INVOICE</th>` : ``}
                    <th>ADDRESS</th>
                    <th>IDENTIFICATION</th>
                    <th>MED</th>
                    <th>AMOUNT</th>
                </tr>
            </thead>
            <tbody>
    `;

    for (const e of entries) {

        const first = e[0] || '';

        const time = first.match(/\b(\d{2}:\d{2}:\d{2})\b/)?.[1] || '';
        const name = first.match(/\d{2}:\d{2}:\d{2}\s+(.*?)\s+TMF/i)?.[1] || '';

        const identification = (e[3] || '').replace(/[^a-zA-Z0-9-]/g, '');

        const address = e.slice(6, 19)
            .map(clean)
            .filter(x => x && x !== '-')
            .join(', ')
            .replace(/\s+/g, ' ')
            .trim();

        const med = extractMed(e);

        let invoice = '';

        if (hasAnyInvoice) {
            for (const s of secondEntries) {
                const text = s.join(' ').toLowerCase();
                if (!text.includes(name.toLowerCase()) || !text.includes(med.toLowerCase())) continue;

                const idx = s.findIndex(l => l.toLowerCase().includes(name.toLowerCase()));
                if (idx === -1) continue;

                for (let i = idx; i < s.length; i++) {
                    const m = s[i].match(/SO\/[\w/]+/);
                    if (m) {
                        invoice = m[0];
                        break;
                    }
                }
                break;
            }
        }

        html += `
            <tr>
                <td>${time || '-'}</td>

                <td>
                    <div class="copybox" data-copy="${encodeURIComponent(name)}" onclick="copyText(this)">
                        ${escapeHTML(name) || '-'}
                    </div>
                </td>

                ${hasAnyInvoice ? `
                <td>
                    <div class="copybox" data-copy="${encodeURIComponent(invoice)}" onclick="copyText(this)">
                        ${invoice || '-'}
                    </div>
                </td>` : ``}

                <td>
                    <div class="copybox" data-copy="${encodeURIComponent(address)}" onclick="copyText(this)">
                        ${escapeHTML(address) || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox" data-copy="${encodeURIComponent(identification)}" onclick="copyText(this)">
                        ${identification || '-'}
                    </div>
                </td>

                <td>
                    <div class="copybox" data-copy="${encodeURIComponent(med)}" onclick="copyText(this)">
                        ${escapeHTML(med) || '-'}
                    </div>
                </td>

                <td>-</td>
            </tr>
        `;
    }

    html += `</tbody></table>`;
    document.getElementById('output').innerHTML = html;
}

</script>

</body>
</html>
